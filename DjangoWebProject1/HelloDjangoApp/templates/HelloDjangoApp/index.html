<html>
<head>
    <title>Teachers</title>
</head>

<body>

    <strong>Teacher</strong>

    {% if content %}
    <table>
        <tr>
            <th>Name</th>
            <th>Teaching area</th>
        </tr>
        {% for teach in content %}
        <tr>
            <td>{{teach.name}}</td>
            <td>{{teach.area}}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <strong>NO data!!</strong>
    {% endif %}
    <p><a href="{% url 'report'%}">Input new Teachers</a></p>
    <p><a href="{% url 'report'%}">Download as pdf</a></p>
</body>
</html>
