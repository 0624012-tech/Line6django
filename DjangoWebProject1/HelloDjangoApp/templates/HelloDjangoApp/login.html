<!doctype html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>
    {% for message in messages %}<p>{{ message }}</p>{% endfor %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log In</button>
    </form>
    <p><a href="{% url 'accounts:signup' %}">Sign up</a></p>
</body>
</html>
