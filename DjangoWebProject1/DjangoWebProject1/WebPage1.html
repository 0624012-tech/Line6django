<!doctype html>
<html>
<head>
    <title>Sign Up</title>
</head>
<body>
    <h1>Sign Up</h1>
    {% for message in messages %}<p>{{ message }}</p>{% endfor %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign Up</button>
    </form>
    <p><a href="{% url 'accounts:login' %}">Already have an account? Log in</a></p>
</body>
</html>
